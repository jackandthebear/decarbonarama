<svg viewBox="0 0 520 120" xmlns="http://www.w3.org/2000/svg" width="520" height="120">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&amp;display=swap');
    </style>
  </defs>

  <!-- Icon: house with lightning bolt -->
  <!-- House body -->
  <rect x="18" y="52" width="64" height="52" rx="3" fill="#166534"/>
  <!-- Roof (triangle) -->
  <polygon points="10,56 50,16 90,56" fill="#15803D"/>
  <!-- Door -->
  <rect x="38" y="76" width="24" height="28" rx="2" fill="#FFFFFF" opacity="0.2"/>
  <!-- Lightning bolt (solar energy) inside house -->
  <polygon points="46,45 54,35 54,44 58,44 52,54 52,45 46,45" fill="#FCD34D"/>
  <!-- Chimney / solar panel indicator line -->
  <!-- Solar accent: small rays at top of roof -->
  <line x1="50" y1="10" x2="50" y2="4" stroke="#FCD34D" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="58" y1="13" x2="62" y2="8" stroke="#FCD34D" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="42" y1="13" x2="38" y2="8" stroke="#FCD34D" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Tagline -->
  <text
    x="107"
    y="102"
    font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-size="13"
    font-weight="400"
    letter-spacing="2.5"
    fill="#6B7280"
  >KNOW BEFORE YOU RETROFIT.</text>

  <!-- Wordmark -->
  <!-- "decarbon" lighter, "arma" bold green -->
  <text
    x="106"
    y="79"
    font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-size="46"
    font-weight="400"
    letter-spacing="-1"
    fill="#111827"
  >decarbon</text>
  <text
    x="330"
    y="79"
    font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-size="46"
    font-weight="700"
    letter-spacing="-1"
    fill="#166534"
  >arma</text>

</svg>
