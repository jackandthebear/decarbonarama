<!--
  Decarbonarma email capture box — reusable snippet
  =================================================
  Paste this whole block into any article/page where you want the signup box,
  ideally just before the closing </main> or the <footer>.

  It is self-contained: it carries its own <style> (scoped to .dca-* classes)
  and uses CSS var() fallbacks, so it works whether or not the host page
  defines the article :root palette.

  Posts to the Mailchimp audience via the embedded-form endpoint below.
  - EMAIL field  = Mailchimp merge tag (required)
  - b_..._... field = Mailchimp anti-bot honeypot; leave it hidden/empty.
  Form opens Mailchimp's confirmation page in a new tab (target="_blank").
-->
<!-- dca-email-capture -->
<div class="dca-signup-outer">
  <div class="dca-signup">
    <div class="dca-signup-kicker">Decarbonarma Newsletter</div>
    <h3 class="dca-signup-h">Get the next one in your inbox</h3>
    <p class="dca-signup-sub">Clear, no-nonsense analysis of UK home decarbonisation &mdash; heat pumps, solar, EVs, batteries and the grid. Occasional emails, no spam, unsubscribe anytime.</p>
    <form action="https://decarbonarma.us15.list-manage.com/subscribe/post?u=cffa5aec4001ad97d9357f807&amp;id=8d5f19dec4&amp;f_id=0096a2e1f0" method="post" target="_blank" novalidate class="dca-signup-form">
      <label class="dca-visually-hidden" for="dca-email">Email address</label>
      <input type="email" name="EMAIL" id="dca-email" required placeholder="you@example.com" class="dca-signup-input">
      <!-- Mailchimp bot-prevention honeypot: real users leave this empty -->
      <div aria-hidden="true" style="position:absolute;left:-5000px;"><input type="text" name="b_cffa5aec4001ad97d9357f807_8d5f19dec4" tabindex="-1" value=""></div>
      <button type="submit" name="subscribe" class="dca-signup-btn">Subscribe</button>
    </form>
    <div class="dca-signup-fine">We&rsquo;ll never share your email. Powered by Mailchimp.</div>
  </div>
</div>
<style>
  .dca-signup-outer{max-width:820px;margin:48px auto 10px;padding:0 24px;}
  .dca-signup{background:var(--bg3,#162019);border:1px solid var(--green-pale2,rgba(74,222,128,0.13));border-radius:16px;padding:30px 28px;position:relative;overflow:hidden;}
  .dca-signup::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--green,#4ade80),var(--amber,#fbbf24));}
  .dca-signup-kicker{font-family:var(--mono,'JetBrains Mono',monospace);font-size:11.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--green,#4ade80);margin-bottom:8px;}
  .dca-signup-h{font-family:var(--serif,'Playfair Display',Georgia,serif);font-weight:700;font-size:1.5rem;color:#fff;margin:0 0 .3em;line-height:1.15;}
  .dca-signup-sub{font-family:var(--body,'Source Serif 4',Georgia,serif);font-size:15px;color:var(--text-mid,#94a894);margin:0 0 18px;line-height:1.6;font-weight:300;}
  .dca-signup-form{display:flex;gap:10px;flex-wrap:wrap;}
  .dca-signup-input{flex:1 1 240px;min-width:0;background:var(--bg,#0d1510);border:1px solid var(--border2,rgba(255,255,255,0.13));border-radius:10px;padding:13px 15px;color:var(--text,#e4ede5);font-family:var(--body,'Source Serif 4',Georgia,serif);font-size:15px;}
  .dca-signup-input:focus{outline:none;border-color:var(--green,#4ade80);box-shadow:0 0 0 3px var(--green-pale,rgba(74,222,128,0.08));}
  .dca-signup-input::placeholder{color:var(--text-dim,#5a6c5a);}
  .dca-signup-btn{flex:0 0 auto;background:var(--green,#4ade80);color:#062012;border:none;border-radius:10px;padding:13px 26px;font-family:var(--mono,'JetBrains Mono',monospace);font-size:13px;font-weight:500;letter-spacing:.04em;text-transform:uppercase;cursor:pointer;transition:background .15s;}
  .dca-signup-btn:hover{background:var(--green-dim,#22c55e);}
  .dca-signup-fine{font-family:var(--mono,'JetBrains Mono',monospace);font-size:11px;color:var(--text-dim,#5a6c5a);margin-top:12px;letter-spacing:.02em;}
  .dca-visually-hidden{position:absolute!important;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0);white-space:nowrap;}
  @media(max-width:520px){.dca-signup-btn{flex:1 1 100%;}}
</style>
<!-- /dca-email-capture -->
